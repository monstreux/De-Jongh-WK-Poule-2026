<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WK-poule 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16201A; --green:#0B6E4F; --green2:#159E6B; --greenDark:#084e38;
    --orange:#F2722B; --amber:#F2A030; --gold:#C9A227; --silver:#9AA0A6; --bronze:#B07A3C;
    --red:#E24B4A; --purple:#534AB7; --muted:#6B7280; --line:#E9E2D6; --soft:#F4EEE3;
    --win:#0B6E4F; --draw:#9AA0A6; --loss:#C24A3B; --bg:#FFFBF4;
    --display:"Anton","Arial Black",Impact,Helvetica,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto;padding:0 16px 56px}
  header{position:relative;overflow:hidden;background:linear-gradient(120deg,#0B6E4F 0%,#159E6B 48%,#F2A030 100%);color:#fff;margin:0 0 16px;padding:26px 16px 20px;border-radius:0 0 22px 22px}
  .cf{position:absolute;border-radius:50%;opacity:.85}
  .hwrap{position:relative;max-width:780px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;opacity:.9;font-weight:700}
  h1{font-family:var(--display);margin:4px 0 0;font-size:38px;line-height:.95;letter-spacing:.5px;font-weight:400}
  .sub{margin-top:8px;font-size:13px;opacity:.95;font-weight:600}
  .refresh{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.65);color:#fff;border-radius:10px;padding:8px 14px;font:700 14px Helvetica,Arial,sans-serif;cursor:pointer}
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{flex:1;min-width:80px;padding:11px 4px;border-radius:12px;cursor:pointer;font:800 14px Helvetica,Arial,sans-serif;border:1.5px solid var(--line);background:#fff;color:var(--muted)}
  .tab.active{border-color:var(--orange);background:var(--orange);color:#fff}
  .card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;margin-bottom:9px}
  .rank{width:34px;text-align:center;font-family:var(--display);font-size:22px;color:var(--muted)}
  .who{flex:1;min-width:0}
  .name{font-family:var(--display);font-size:19px;letter-spacing:.3px}
  .lands{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.6}
  .wgv{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .pts{font-family:var(--display);font-size:30px;line-height:1;color:var(--green);text-align:right}
  .ptslabel{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-align:right}
  /* podium */
  .row.podium{border:none;color:#fff}
  .row.podium .rank{font-size:26px;color:#fff;width:34px}
  .row.podium .name,.row.podium .pts{color:#fff}
  .row.podium .ptslabel{color:rgba(255,255,255,.85)}
  .row.podium .lands{color:rgba(255,255,255,.92)}
  .row.podium .pill{color:#fff !important}
  .row.podium .pill .dot{background:#fff !important}
  .row.podium .pill span,.row.podium .wlabel{color:rgba(255,255,255,.85) !important}
  .row.podium.g1{background:linear-gradient(100deg,#C9821B,#F2A030)}
  .row.podium.g2{background:linear-gradient(100deg,#7E8790,#A9B0B6)}
  .row.podium.g3{background:linear-gradient(100deg,#9A5A2B,#C07A3C)}
  table{border-collapse:collapse;width:100%;font-family:Helvetica,Arial,sans-serif}
  th,td{text-align:right;padding:9px 6px;font-size:14px}
  th{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  td.l,th.l{text-align:left}
  tr+tr td{border-top:1px solid var(--soft)}
  .scroll{overflow-x:auto}
  .awards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .award{flex:1 1 150px;border:none;border-radius:14px;padding:13px 15px;color:#fff}
  .awards .award:nth-child(1){background:linear-gradient(120deg,#0B6E4F,#159E6B)}
  .awards .award:nth-child(2){background:linear-gradient(120deg,#E24B4A,#F2722B)}
  .awards .award:nth-child(3){background:linear-gradient(120deg,#C9821B,#F2A030)}
  .awards .award:nth-child(4){background:linear-gradient(120deg,#534AB7,#7F77DD)}
  .award .em{font-size:22px}
  .award .t{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .award .n{font-family:var(--display);font-size:21px;margin-top:3px;letter-spacing:.3px}
  .award .v{font-size:13px;color:rgba(255,255,255,.95);font-weight:700}
  h2.grp{font-family:var(--display);margin:20px 0 8px;font-size:22px;color:var(--green);letter-spacing:.5px}
  .match{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-top:1px solid var(--soft);font-size:14px}
  .match:first-child{border-top:none}
  .mt{flex:1;min-width:0}
  .mteam{display:flex;justify-content:space-between;gap:8px}
  .mteam.win{font-weight:800}
  .mmeta{font-size:12px;color:var(--muted);margin-top:2px}
  .ko-round{font-family:var(--display);margin:20px 0 6px;font-size:19px;color:var(--orange);letter-spacing:.4px}
  .note{color:var(--muted);font-size:12px;margin-top:12px;line-height:1.5}
  .status{text-align:center;color:var(--muted);font-size:13px;padding:30px 8px}
  .err{background:#FFF1DD;border:1px solid var(--amber);color:#8a5a00;border-radius:10px;padding:12px;font-size:13px;margin-bottom:14px}
  .owner{font-size:11px;color:var(--green);font-weight:700}
  .hide{display:none}
  .bar{height:16px;background:var(--soft);border-radius:10px;overflow:hidden;margin-top:10px}
  .barfill{height:100%;background:linear-gradient(90deg,#0B6E4F,#159E6B,#F2A030,#E24B4A)}
  .timeline{position:relative;display:flex;height:20px;border-radius:8px;overflow:hidden;margin-top:12px}
  .tl-seg{height:100%}
  .tl-seg + .tl-seg{border-left:2px solid #fff}
  .tl-future{position:absolute;top:0;bottom:0;right:0;background:rgba(255,255,255,.55)}
  .tl-marker{position:absolute;top:-3px;bottom:-3px;width:3px;background:#16201A;border-radius:2px}
  .tl-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px}
  .tl-li{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:600}
  .tl-dot{width:9px;height:9px;border-radius:2px;display:inline-block}
  .mmatch{display:flex;align-items:center;gap:8px;padding:11px 2px;border-top:1px solid var(--soft)}
  .mmatch:first-child{border-top:none}
  .mm-teams{flex:1.3 1 0;min-width:0;font-size:15px;line-height:1.8;font-weight:600}
  .mm-t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mm-t.mm-win{font-weight:800}
  .mm-loc{flex:1 1 0;min-width:0;text-align:center;font-size:12px;color:var(--muted);font-weight:600;line-height:1.3}
  .mm-num{font-size:11px;color:var(--green);font-weight:800;margin-bottom:1px}
  .sect{margin-bottom:14px}
  .sect-head{font-family:var(--display);font-size:17px;color:#fff;padding:9px 14px;border-radius:14px 14px 0 0;letter-spacing:.5px}
  .sect.vooruit .sect-head{background:linear-gradient(90deg,#0B6E4F,#159E6B)}
  .sect.terug .sect-head{background:linear-gradient(90deg,#586660,#828F86)}
  .sect .card{margin-bottom:0;border-radius:0 0 14px 14px}
  .sub-day{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:9px 2px 2px}
  .sect.schema .sect-head{background:linear-gradient(90deg,#3F37A6,#6E66D6)}
  .bscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .bracket{display:flex;align-items:stretch;min-width:max-content;padding:2px 0}
  .bround{display:flex;flex-direction:column;width:124px;flex:0 0 auto}
  .bround:not(:last-child){margin-right:22px}
  .bround-head{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:8px;letter-spacing:.4px}
  .bround-body{flex:1;display:flex;flex-direction:column}
  .bmatch{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative}
  .bm{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:5px 7px}
  .bm-t{display:flex;justify-content:space-between;align-items:center;gap:5px;white-space:nowrap;font-size:12px;font-weight:700;line-height:1.7}
  .bm-team{overflow:hidden;text-overflow:ellipsis}
  .bm-own{font-size:10px;color:var(--muted);font-weight:800}
  .bm-t.bw{color:var(--green)}
  .bm-t.bw .bm-own{color:var(--green);opacity:.75}
  .bm-t .dim{color:var(--muted);opacity:.5}
  .bm-s{font-weight:800}
  .bround:not(:last-child) .bm::after{content:"";position:absolute;top:50%;left:100%;width:11px;height:2px;background:#C7BFAE}
  .bround:not(:last-child) .bmatch:nth-child(odd)::after{content:"";position:absolute;top:50%;left:calc(100% + 11px);width:2px;height:100%;background:#C7BFAE}
  .bround:not(:first-child) .bm::before{content:"";position:absolute;top:50%;right:100%;width:11px;height:2px;background:#C7BFAE}
  .bextra{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .bextra-l{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}
  .bextra .bm{min-width:150px}
  .mm-right{flex:0 0 auto;text-align:right;min-width:64px}
  .mm-time{font-family:var(--display);font-size:23px;color:var(--orange);line-height:1}
  .mm-score{font-family:var(--display);font-size:24px;color:var(--green);line-height:1}
  .mm-sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
  @media (max-width:430px){
    header{padding:22px 14px 18px}
    h1{font-size:30px}
    .tab{min-width:0;padding:9px 2px;font-size:13px}
    .name{font-size:18px}
    .pts{font-size:26px}
    h2.grp{font-size:20px}
    .lands{font-size:11px}
    .mm-teams{font-size:13px}
    .mm-loc{font-size:10.5px}
    .mm-time{font-size:20px}
    .mm-score{font-size:21px}
  }
</style>
</head>
<body>
<header>
  <span class="cf" style="width:12px;height:12px;background:#FFC24B;bottom:16px;left:42%"></span>
  <span class="cf" style="width:8px;height:8px;background:#E24B4A;top:18px;left:56%"></span>
  <span class="cf" style="width:10px;height:10px;background:rgba(255,255,255,.7);bottom:26px;left:64%"></span>
  <div class="hwrap">
    <div>
      <div class="eyebrow" id="hdDate">Stand &middot; uitslagen &middot; stats</div>
      <h1>WK-poule 2026 ⚽</h1>
      <div class="sub">Groep: winst 3, gelijk 1 &middot; Knock-out: 3 / 6 / 9 / 12 / 15</div>
    </div>
    <button class="refresh" id="refreshBtn">Ververs</button>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="overzicht">Overzicht</button>
    <button class="tab" data-tab="klassement">Klassement</button>
    <button class="tab" data-tab="stats">Stats</button>
    <button class="tab" data-tab="groepen">Groepsfase</button>
    <button class="tab" data-tab="ko">Knock-out</button>
  </div>

  <div id="msg"></div>
  <section id="overzicht"></section>
  <section id="klassement" class="hide"></section>
  <section id="stats" class="hide"></section>
  <section id="groepen" class="hide"></section>
  <section id="ko" class="hide"></section>

  <div class="note" id="footer"></div>
</div>

<script>
// ---- Bronnen (keyloos, publiek domein). Mirror eerst, officieel als reserve. ----
const SOURCES = [
  {url:"https://raw.githubusercontent.com/upbound-web/worldcup-live.json/master/2026/worldcup.json", name:"upbound (snel)"},
  {url:"https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json", name:"openfootball"}
];

// ---- Deelnemers (landen in feed-spelling) ----
const PARTICIPANTS = [
  {name:"Shirley", lands:["France","Uruguay","Colombia","South Africa","Czech Republic","Jordan"]},
  {name:"Anouk",   lands:["Netherlands","Morocco","South Korea","Canada","Uzbekistan","Haiti"]},
  {name:"Lia",     lands:["Brazil","Croatia","Qatar","Saudi Arabia","Paraguay","Iraq"]},
  {name:"Bas W",   lands:["Spain","Mexico","USA","Turkey","Sweden","Iran"]},
  {name:"Bas VS",  lands:["England","Belgium","Ecuador","Egypt","Algeria","Cape Verde"]},
  {name:"Gap",     lands:["Switzerland","Norway","Ghana","Tunisia","Bosnia & Herzegovina","Curaçao"]},
  {name:"Steef",   lands:["Argentina","Japan","Australia","Ivory Coast","New Zealand","DR Congo"]},
  {name:"Brigitte",lands:["Germany","Portugal","Austria","Senegal","Scotland","Panama"]},
];

// ---- Weergave NL + vlag per land ----
const LAND = {
  "France":["Frankrijk","🇫🇷"],"Uruguay":["Uruguay","🇺🇾"],"Colombia":["Colombia","🇨🇴"],
  "South Africa":["Zuid-Afrika","🇿🇦"],"Czech Republic":["Tsjechië","🇨🇿"],"Jordan":["Jordanië","🇯🇴"],
  "Netherlands":["Nederland","🇳🇱"],"Morocco":["Marokko","🇲🇦"],"South Korea":["Zuid-Korea","🇰🇷"],
  "Canada":["Canada","🇨🇦"],"Uzbekistan":["Oezbekistan","🇺🇿"],"Haiti":["Haïti","🇭🇹"],
  "Brazil":["Brazilië","🇧🇷"],"Croatia":["Kroatië","🇭🇷"],"Qatar":["Qatar","🇶🇦"],
  "Saudi Arabia":["Saoedi-Arabië","🇸🇦"],"Paraguay":["Paraguay","🇵🇾"],"Iraq":["Irak","🇮🇶"],
  "Spain":["Spanje","🇪🇸"],"Mexico":["Mexico","🇲🇽"],"USA":["Verenigde Staten","🇺🇸"],
  "Turkey":["Turkije","🇹🇷"],"Sweden":["Zweden","🇸🇪"],"Iran":["Iran","🇮🇷"],
  "England":["Engeland","🏴󠁧󠁢󠁥󠁮󠁧󠁿"],"Belgium":["België","🇧🇪"],"Ecuador":["Ecuador","🇪🇨"],
  "Egypt":["Egypte","🇪🇬"],"Algeria":["Algerije","🇩🇿"],"Cape Verde":["Kaapverdië","🇨🇻"],
  "Switzerland":["Zwitserland","🇨🇭"],"Norway":["Noorwegen","🇳🇴"],"Ghana":["Ghana","🇬🇭"],
  "Tunisia":["Tunesië","🇹🇳"],"Bosnia & Herzegovina":["Bosnië","🇧🇦"],"Curaçao":["Curaçao","🇨🇼"],
  "Argentina":["Argentinië","🇦🇷"],"Japan":["Japan","🇯🇵"],"Australia":["Australië","🇦🇺"],
  "Ivory Coast":["Ivoorkust","🇨🇮"],"New Zealand":["Nieuw-Zeeland","🇳🇿"],"DR Congo":["DR Congo","🇨🇩"],
  "Germany":["Duitsland","🇩🇪"],"Portugal":["Portugal","🇵🇹"],"Austria":["Oostenrijk","🇦🇹"],
  "Senegal":["Senegal","🇸🇳"],"Scotland":["Schotland","🏴󠁧󠁢󠁳󠁣󠁴󠁿"],"Panama":["Panama","🇵🇦"],
};
const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();
const nl   = en => (LAND[en]?LAND[en][0]:en);
const flag = en => (LAND[en]?LAND[en][1]:"⚽");
// land -> deelnemer (voor labels in groepsfase)
const OWNER = {};
PARTICIPANTS.forEach(p=>p.lands.forEach(l=>OWNER[norm(l)]=p.name));

let MATCHES = [];
let lastLoaded = null;
let loadedSource = null;
let loadedPlayed = 0;

// ---- Uitslag bepalen voor een team in een match ----
function outcome(m, teamEN){
  const s = m.score; if(!s || !s.ft) return null;
  const isT1 = norm(m.team1)===norm(teamEN);
  const fin = s.et || s.ft;                 // eindstand (na verlenging indien aanwezig)
  const gf = isT1 ? fin[0] : fin[1];
  const ga = isT1 ? fin[1] : fin[0];
  let res;
  if (s.p){                                  // beslist op penalty's = winst telt als winst
    const pf = isT1 ? s.p[0] : s.p[1];
    const pa = isT1 ? s.p[1] : s.p[0];
    res = pf>pa ? "W" : "V";
  } else {
    res = gf>ga ? "W" : gf<ga ? "V" : "G";
  }
  return {gf, ga, res, ko: !m.group};
}

// ---- Winstpunten per ronde (knock-out loopt op) ----
function winPoints(m){
  if(m.group) return 3;                       // groepsfase
  switch(m.round){
    case "Round of 32": return 3;
    case "Round of 16": return 6;
    case "Quarter-final": return 9;
    case "Semi-final": return 12;
    case "Final": return 15;
    case "Match for third place": return 0;   // troostfinale: geen bonus
    default: return 3;
  }
}

// ---- Alles per deelnemer ----
function computeParticipant(p){
  let w=0,g=0,v=0,gf=0,ga=0,cs=0,sp=0,pts=0;
  const scorers = {};
  p.lands.forEach(land=>{
    MATCHES.forEach(m=>{
      const inMatch = norm(m.team1)===norm(land) || norm(m.team2)===norm(land);
      if(!inMatch) return;
      const o = outcome(m, land); if(!o) return;
      sp++; gf+=o.gf; ga+=o.ga;
      if(o.res==="W"){ w++; pts+=winPoints(m); }
      else if(o.res==="G"){ g++; pts+=1; }
      else v++;
      if(o.ga===0) cs++;
      const isT1 = norm(m.team1)===norm(land);
      const goals = (isT1? m.goals1 : m.goals2) || [];
      goals.forEach(gl=>{ const k=gl.name; scorers[k]=(scorers[k]||0)+1; });
    });
  });
  let top=null;
  Object.keys(scorers).forEach(n=>{ if(!top||scorers[n]>top.goals) top={name:n,goals:scorers[n]}; });
  return {...p, w,g,v,sp,gf,ga,cs,saldo:gf-ga,pts, top};
}

function ranked(){
  return PARTICIPANTS.map(computeParticipant)
    .sort((a,b)=> b.pts-a.pts || b.w-a.w || b.saldo-a.saldo || a.name.localeCompare(b.name));
}

// ---- Ranglijst per land (punten, dan doelsaldo), met poule-eigenaar ----
function landRanking(){
  const all=[];
  PARTICIPANTS.forEach(p=>p.lands.forEach(land=>{
    let pts=0,gf=0,ga=0,sp=0;
    MATCHES.forEach(m=>{
      if(norm(m.team1)!==norm(land)&&norm(m.team2)!==norm(land)) return;
      const o=outcome(m,land); if(!o) return;
      sp++; gf+=o.gf; ga+=o.ga;
      if(o.res==="W") pts+=winPoints(m); else if(o.res==="G") pts+=1;
    });
    all.push({land, owner:p.name, pts, saldo:gf-ga, sp});
  }));
  return all.sort((a,b)=> b.pts-a.pts || b.saldo-a.saldo || nl(a.land).localeCompare(nl(b.land)));
}

// ---- Kickoff naar NL-tijd ----
function kickoff(m){
  const t = (m.time||"").match(/(\d{1,2}):(\d{2}).*UTC([+-]\d{1,2})/);
  if(!t || !m.date) return m.time||"";
  const off = (t[3].length===2? t[3][0]+"0"+t[3].slice(1): t[3].replace(/([+-])(\d)$/,"$10$2"));
  const iso = `${m.date}T${t[1].padStart(2,"0")}:${t[2]}:00${off}:00`;
  const d = new Date(iso);
  if(isNaN(d)) return m.time||"";
  return d.toLocaleString("nl-NL",{timeZone:"Europe/Amsterdam",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
}
function scoreStr(m){
  const s=m.score; if(!s||!s.ft) return null;
  const fin=s.et||s.ft; let str=`${fin[0]} - ${fin[1]}`;
  if(s.p) str+=` (pen. ${s.p[0]}-${s.p[1]})`;
  return str;
}

// ---- Renderen ----
function elPill(label,val,color){ return `<span class="pill" style="color:${color}"><span class="dot" style="background:${color}"></span>${val}<span style="color:var(--muted);font-weight:600">${label}</span></span>`; }

// ---- Overzicht / dashboard ----
function todayNL(){
  return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Amsterdam",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
}
function shiftYMD(ymd,days){
  const d=new Date(ymd+"T12:00:00Z"); d.setUTCDate(d.getUTCDate()+days); return d.toISOString().slice(0,10);
}
function dayLabel(ymd){

function koDate2(m){

function koClock(m){ const d=koDate2(m); return d? d.toLocaleTimeString("nl-NL",{timeZone:"Europe/Amsterdam",hour:"2-digit",minute:"2-digit"}) : (m.time||""); }
function koDay(m){ const d=koDate2(m); return d? d.toLocaleDateString("nl-NL",{timeZone:"Europe/Amsterdam",day:"numeric",month:"short"}) : (m.date||""); }

function byTime(a,b){ return koSortKey(a)-koSortKey(b); }

// Vaste bracket-koppelingen (welke wedstrijden samenkomen), als terugval wanneer de bron de Winnaar-verwijzing al door een land heeft vervangen
const KO_FEEDERS={89:[74,77],90:[73,75],91:[76,78],92:[79,80],93:[83,84],94:[81,82],95:[86,88],96:[85,87],97:[89,90],98:[93,94],99:[91,92],100:[95,96],101:[97,98],102:[99,100]};
function feedersOf(m){
  if(!m) return null;
  const ref=[m.team1,m.team2].map(t=>{const x=(t||"").match(/^W(\d+)$/);return x?+x[1]:null;});
  if(ref[0]&&ref[1]) return ref;          // uit de Winnaar-wd-verwijzing
  if(m.round==="Final") return [101,102];
  return KO_FEEDERS[m.num]||null;          // terugval op vaste structuur
}
// volgorde per ronde, van boven naar beneden in de boom (top-down vanaf de finale)
function bracketRounds(){
  const byNum={}; MATCHES.forEach(m=>{ if(m.num!=null) byNum[m.num]=m; });
  const finalM=MATCHES.find(m=>m.round==="Final");
  if(!finalM) return null;
  const seq=["Final","Semi-final","Quarter-final","Round of 16","Round of 32"];
  const order={Final:[finalM]};
  for(let i=1;i<seq.length;i++){
    const cur=[];
    order[seq[i-1]].forEach(m=>{ const f=feedersOf(m); if(f) f.forEach(n=>{ if(byNum[n]) cur.push(byNum[n]); }); });
    order[seq[i]]=cur;
  }
  return order;
}

function cdText(ts){

  const totMin=Math.floor(diff/60000);
  if(totMin<1) return "begint zo";
  const h=Math.floor(totMin/60), mn=totMin%60;
  if(h>=1) return mn ? `over ${h} uur ${mn} min` : `over ${h} uur`;
  return `over ${mn} min`;
}

function groupStanding(groupName){
  const ms = MATCHES.filter(m=>m.group===groupName);
  const teams={};
  const add=t=>{ if(!teams[t]) teams[t]={team:t,sp:0,w:0,g:0,v:0,gf:0,ga:0}; };
  ms.forEach(m=>{ add(m.team1); add(m.team2);
    const s=m.score; if(!s||!s.ft) return;
    const fin=s.ft; const a=teams[m.team1], b=teams[m.team2];
    a.sp++; b.sp++; a.gf+=fin[0]; a.ga+=fin[1]; b.gf+=fin[1]; b.ga+=fin[0];
    if(fin[0]>fin[1]){a.w++;b.v++;} else if(fin[0]<fin[1]){b.w++;a.v++;} else {a.g++;b.g++;}
  });
  return Object.values(teams).map(t=>({...t,pts:t.w*3+t.g,saldo:t.gf-t.ga}))
    .sort((x,y)=> y.pts-x.pts || y.saldo-x.saldo || y.gf-x.gf || x.team.localeCompare(y.team));
}

// ---- Bekende plekken zelf invullen (groepswinnaar, nr. 2, KO-winnaars) ----
function groupByLetter(L){
  const groups=[...new Set(MATCHES.filter(m=>m.group).map(m=>m.group))];
  return groups.find(g=> g===L || g.endsWith(" "+L) || g.endsWith(L)) || ("Group "+L);
}
function groupComplete(gname){
  const ms=MATCHES.filter(m=>m.group===gname);
  if(!ms.length || !ms.every(m=>m.score&&m.score.ft)) return false;
  const teams=new Set(); ms.forEach(m=>{teams.add(norm(m.team1));teams.add(norm(m.team2));});
  const n=teams.size;
  return n>=2 && ms.length>=n*(n-1)/2;   // elk team heeft tegen elk ander gespeeld
}
function isReal(code){ return LAND[code]!==undefined || OWNER[norm(code)]!==undefined; }
// Welke nummer 3 op welke laatste-32-plek komt: per plekhouder de bron-groep, vastgelegd uit de definitieve bracket
const THIRD_SLOT={"3A/B/C/D/F":"D","3C/D/F/G/H":"F","3C/E/F/H/I":"E","3E/H/I/J/K":"K","3B/E/F/I/J":"B","3A/E/H/I/J":"I","3E/F/G/I/J":"J","3D/E/I/J/L":"L"};
function koResultTeam(num,which){
  const mt=MATCHES.find(x=>x.num===num); if(!mt) return null;
  const s=mt.score; if(!s||!(s.ft||s.et)) return null;
  const t1=resolve(mt.team1)||mt.team1, t2=resolve(mt.team2)||mt.team2;
  const fin=s.et||s.ft;
  const winT1 = s.p ? s.p[0]>s.p[1] : fin[0]>fin[1];
  const r = (which==="W") ? (winT1?t1:t2) : (winT1?t2:t1);
  return isReal(r)? r : null;
}
function resolve(code){
  if(isReal(code)) return code;            // al een echt land
  let m;
  if(m=code.match(/^([12])([A-L])$/)){     // groepswinnaar of nr. 2
    const g=groupByLetter(m[2]);
    if(groupComplete(g)){ const st=groupStanding(g), idx=+m[1]-1; if(st[idx]) return st[idx].team; }
    return null;
  }
  if(THIRD_SLOT[code]){                     // nr. 3-plek: groep vastgelegd uit definitieve bracket, land uit de eindstand
    const g=groupByLetter(THIRD_SLOT[code]);
    if(groupComplete(g)){ const st=groupStanding(g); if(st[2]) return st[2].team; }
    return null;
  }
  if(m=code.match(/^W(\d+)$/)) return koResultTeam(+m[1],"W");
  if(m=code.match(/^L(\d+)$/)) return koResultTeam(+m[1],"L");
  return null;                              // onbekende plekhouder
}

// placeholder -> leesbaar
function ph(code){
  const r=resolve(code);
  if(r) return `${flag(r)} ${nl(r)}`;
  let m;
  if(m=code.match(/^([123])([A-L])$/)){ const o={1:"Winnaar",2:"Nr. 2",3:"Nr. 3"}; return `${o[m[1]]} groep ${m[2]}`; }
  if(m=code.match(/^3([A-L/]+)$/)) return `Nr. 3 (${m[1]})`;
  if(m=code.match(/^W(\d+)$/)) return `Winnaar wd ${m[1]}`;
  if(m=code.match(/^L(\d+)$/)) return `Verliezer wd ${m[1]}`;
  return code;
}
// land plus poule-eigenaar (Gap, Lia, ...) voor weergave bij wedstrijden
function teamCell(code){
  const r=resolve(code)||code;
  const own=OWNER[norm(r)];
  return `${ph(code)}${own?` <span class="owner">${own}</span>`:""}`;
}
function renderKO(){
  const order=["Round of 32","Round of 16","Quarter-final","Semi-final","Match for third place","Final"];
  const labels={"Round of 32":"Achtste finales (laatste 32)","Round of 16":"Achtste finales (laatste 16)","Quarter-final":"Kwartfinales","Semi-final":"Halve finales","Match for third place":"Troostfinale","Final":"Finale"};
  let h="";
  order.forEach(r=>{
    const ms=MATCHES.filter(m=>m.round===r).sort(byTime);
    if(!ms.length) return;
    h+=`<div class="ko-round">${labels[r]||r}</div><div class="card">`;
    ms.forEach(m=>{ h+=miniMatch(m,{date:true,num:true}); });
    h+=`</div>`;
  });
  document.getElementById("ko").innerHTML=h;
}

function renderAll(){
  renderOverzicht(); renderKlassement(); renderStats(); renderGroepen(); renderKO();
  document.getElementById("footer").innerHTML =
    `Bron: ${loadedSource||"openfootball"} (publiek domein), ${loadedPlayed} wedstrijden met uitslag.` +
    (lastLoaded?` Laatst geladen ${lastLoaded.toLocaleString("nl-NL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}.`:"");
}

function playedCount(matches){
  let n=0;
  for(const m of (matches||[])){ if(m.score && (m.score.ft||m.score.et)) n++; }
  return n;
}
async function load(){
  document.getElementById("msg").innerHTML="";
  const results=[];
  await Promise.all(SOURCES.map(async (s,i)=>{
    try{
      const r=await fetch(s.url,{cache:"no-store"});
      if(!r.ok) return;
      const data=await r.json();
      const matches=data.matches||[];
      if(matches.length) results.push({name:s.name, matches, played:playedCount(matches), order:i});
    }catch(e){ /* bron faalt, overslaan */ }
  }));
  if(!results.length){
    document.getElementById("msg").innerHTML=
      `<div class="err">De live data kon nu niet geladen worden. In de preview binnen Claude blokkeert de omgeving soms externe data. Zodra deze pagina op Vercel staat, werkt de live stand normaal. Druk anders op Ververs.</div>`;
    return;
  }
  // kies de meest actuele bron: meeste wedstrijden met uitslag, bij gelijk de eerste op volgorde
  results.sort((a,b)=> b.played-a.played || a.order-b.order);
  const best=results[0];
  MATCHES=best.matches;
  loadedSource=best.name;
  loadedPlayed=best.played;
  lastLoaded=new Date();
  renderAll();
}

// tabs
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  ["overzicht","klassement","stats","groepen","ko"].forEach(id=>document.getElementById(id).classList.add("hide"));
  document.getElementById(t.dataset.tab).classList.remove("hide");
}));
document.getElementById("refreshBtn").addEventListener("click",load);

document.getElementById("hdDate").textContent = new Date().toLocaleDateString("nl-NL",{timeZone:"Europe/Amsterdam",weekday:"long",day:"numeric",month:"long",year:"numeric"});

load();
setInterval(load, 5*60*1000); // elke 5 minuten data verversen
setInterval(tickCountdowns, 60*1000); // teller elke minuut bijwerken
</script>
</body>
</html>
